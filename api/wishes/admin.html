<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - Wishes</title>
<style>
body { font-family: Arial; background:#0f3024; color:white; padding:20px; }
.card { background:#1a3a2c; padding:15px; margin:10px 0; border-radius:10px; }
button { background:#c8941e; border:none; padding:6px 10px; cursor:pointer; border-radius:6px; }
button:hover { background:#e8c46a; }
small { color:#aaa; }
</style>
</head>
<body>

<h1>Admin - Wishes</h1>
<div id="list">Loading...</div>

<script>
async function load() {
  const res = await fetch('/api/wishes');
  const data = await res.json();

  const list = document.getElementById('list');
  list.innerHTML = '';

  data.reverse().forEach(w => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <b>${w.name}</b> <br>
      <small>${w.message}</small><br><br>
      <button onclick="del('${w.id}')">Delete</button>
    `;

    list.appendChild(div);
  });
}

async function del(id) {
  await fetch('/api/wishes', {
    method: 'DELETE',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({id})
  });

  load();
}

load();
</script>

</body>
</html>
