<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0a0f0c;
  --surface:   #111816;
  --surface2:  #172019;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --green:     #3da06b;
  --green-dim: rgba(61,160,107,0.15);
  --gold:      #c8941e;
  --gold-dim:  rgba(200,148,30,0.15);
  --red:       #d64c4c;
  --red-dim:   rgba(214,76,76,0.15);
  --amber:     #e8a020;
  --amber-dim: rgba(232,160,32,0.12);
  --text:      #e8ede9;
  --text2:     #7a9e87;
  --text3:     #3d5c47;
  --mono:      'JetBrains Mono', monospace;
}

html, body { height: 100%; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── LOGIN SCREEN ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

#login-screen::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(61,160,107,0.06) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.login-card {
  width: 100%;
  max-width: 380px;
  padding: 2.5rem;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.5s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.login-logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-style: italic;
  color: var(--text);
  margin-bottom: 4px;
}

.login-sub {
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 2rem;
}

.login-label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 8px;
}

.login-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 13px 16px;
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 1.2rem;
  appearance: none;
  letter-spacing: 0.1em;
}
.login-input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(61,160,107,0.15);
}

.login-btn {
  width: 100%;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
.login-btn:hover { background: #48b87a; transform: translateY(-1px); }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.login-error {
  margin-top: 12px;
  font-size: 13px;
  color: var(--red);
  text-align: center;
  display: none;
}
.login-error.show { display: block; animation: shake 0.3s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-6px); }
  75%      { transform: translateX(6px); }
}

/* ── ADMIN DASHBOARD ── */
#admin-screen { display: none; }

.topbar {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  gap: 1rem;
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.1rem;
  color: var(--text);
  flex: 1;
}

.topbar-meta {
  font-size: 12px;
  color: var(--text3);
  font-family: var(--mono);
}

.topbar-refresh {
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(61,160,107,0.2);
  border-radius: 8px;
  padding: 6px 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
.topbar-refresh:hover { background: rgba(61,160,107,0.25); }

.topbar-logout {
  background: transparent;
  color: var(--text3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.topbar-logout:hover { color: var(--red); border-color: rgba(214,76,76,0.3); }

/* ── STATS BAR ── */
.stats-bar {
  display: flex;
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}

.stat-block {
  flex: 1;
  background: var(--surface);
  padding: 1rem 1.5rem;
  text-align: center;
}

.stat-num {
  font-family: var(--mono);
  font-size: 1.6rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-num.green { color: var(--green); }
.stat-num.red   { color: var(--red); }
.stat-num.amber { color: var(--amber); }

.stat-label {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-wrap: wrap;
}

.filter-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--green); color: var(--text); }
.filter-btn.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }

.filter-search {
  margin-left: auto;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  color: var(--text);
  outline: none;
  width: 200px;
  transition: border-color 0.2s;
}
.filter-search:focus { border-color: var(--green); }
.filter-search::placeholder { color: var(--text3); }

/* ── WISHES TABLE ── */
.wishes-container {
  padding: 1.5rem;
  max-width: 1200px;
  margin: 0 auto;
}

.loading-state, .empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text3);
  font-size: 14px;
}

.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border2);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

.wish-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 10px;
  transition: border-color 0.2s;
  position: relative;
}
.wish-row:hover { border-color: var(--border2); }
.wish-row.blocked { opacity: 0.5; border-color: rgba(214,76,76,0.2); background: rgba(214,76,76,0.04); }
.wish-row.moderated { border-color: rgba(232,160,32,0.2); }

.wish-row-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}

.wish-avatar-sm {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--green-dim);
  border: 1px solid rgba(61,160,107,0.2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--green);
  flex-shrink: 0;
  overflow: hidden;
}
.wish-avatar-sm img { width: 100%; height: 100%; object-fit: cover; }

.wish-info { flex: 1; min-width: 0; }
.wish-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
.wish-name { font-size: 14px; font-weight: 600; color: var(--text); }
.wish-location { font-size: 12px; color: var(--text3); }

.badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
  letter-spacing: 0.05em;
}
.badge-en     { background: var(--green-dim); color: var(--green); }
.badge-pt     { background: var(--gold-dim);  color: var(--gold); }
.badge-blocked  { background: var(--red-dim);   color: var(--red); }
.badge-edited   { background: var(--amber-dim); color: var(--amber); }
.badge-moderated{ background: var(--amber-dim); color: var(--amber); }
.badge-photo  { background: rgba(74,126,192,0.15); color: #6fa0d4; }
.badge-video  { background: rgba(140,80,200,0.15); color: #b07ad4; }

.wish-ts {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  margin-left: auto;
  flex-shrink: 0;
}

.wish-message-text {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.6;
  margin-bottom: 12px;
  font-style: italic;
  padding-left: 48px;
}

/* Edit mode */
.wish-edit-area {
  display: none;
  padding-left: 48px;
  margin-bottom: 12px;
}
.wish-edit-area.open { display: block; }

.edit-field {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  margin-bottom: 8px;
  transition: border-color 0.2s;
  appearance: none;
}
.edit-field:focus { border-color: var(--green); }
textarea.edit-field { resize: vertical; min-height: 80px; line-height: 1.55; }

.edit-actions { display: flex; gap: 8px; }

/* Media preview in admin */
.wish-media-row {
  display: flex;
  gap: 10px;
  padding-left: 48px;
  margin-bottom: 10px;
  align-items: flex-start;
}
.admin-media-thumb {
  width: 80px; height: 60px;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid var(--border2);
}
.admin-video-thumb {
  width: 120px; height: 70px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  object-fit: cover;
}

/* Action buttons row */
.wish-actions {
  display: flex;
  gap: 6px;
  padding-left: 48px;
  flex-wrap: wrap;
}

.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 7px;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid;
  transition: all 0.15s;
  background: transparent;
}

.btn-edit    { color: var(--green);  border-color: rgba(61,160,107,0.3);  }
.btn-edit:hover    { background: var(--green-dim); }
.btn-save    { color: var(--green);  border-color: var(--green); background: var(--green-dim); }
.btn-save:hover    { background: rgba(61,160,107,0.25); }
.btn-cancel  { color: var(--text2); border-color: var(--border2); }
.btn-cancel:hover  { background: rgba(255,255,255,0.04); }
.btn-block   { color: var(--amber); border-color: rgba(232,160,32,0.3); }
.btn-block:hover   { background: var(--amber-dim); }
.btn-unblock { color: var(--green); border-color: rgba(61,160,107,0.3); }
.btn-unblock:hover { background: var(--green-dim); }
.btn-mod     { color: #6fa0d4;     border-color: rgba(74,126,192,0.3); }
.btn-mod:hover     { background: rgba(74,126,192,0.1); }
.btn-delete  { color: var(--red);   border-color: rgba(214,76,76,0.3); }
.btn-delete:hover  { background: var(--red-dim); }
.action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── CONFIRM MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 2rem;
  max-width: 380px;
  width: 90%;
  animation: popIn 0.25s ease;
}
@keyframes popIn { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }

.modal-icon { font-size: 28px; margin-bottom: 12px; }
.modal-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.modal-body  { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 1.5rem; }
.modal-name  { color: var(--text); font-weight: 500; }
.modal-btns  { display: flex; gap: 8px; }
.modal-confirm { flex: 1; padding: 11px; background: var(--red); color: #fff; border: none; border-radius: 9px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.modal-confirm:hover { background: #c43c3c; }
.modal-cancel-btn { flex: 1; padding: 11px; background: transparent; color: var(--text2); border: 1px solid var(--border2); border-radius: 9px; font-family: 'Outfit', sans-serif; font-size: 14px; cursor: pointer; transition: background 0.2s; }
.modal-cancel-btn:hover { background: rgba(255,255,255,0.04); }

/* ── TOAST ── */
.admin-toast {
  position: fixed;
  bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  z-index: 2000;
  display: flex; align-items: center; gap: 8px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  transform: translateX(-50%) translateY(8px);
  white-space: nowrap;
}
.admin-toast.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
.admin-toast .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.admin-toast.error .dot { background: var(--red); }

@media (max-width: 600px) {
  .stats-bar { flex-wrap: wrap; }
  .stat-block { min-width: 50%; }
  .filter-search { width: 100%; margin-left: 0; }
  .wish-message-text, .wish-actions, .wish-edit-area, .wish-media-row { padding-left: 0; }
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Daniel — Admin</div>
    <div class="login-sub">Painel de Gestão · Management Panel</div>
    <label class="login-label" for="pwd-input">Password / Senha</label>
    <input type="password" id="pwd-input" class="login-input" placeholder="••••••••••" autocomplete="current-password">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Access Panel</button>
    <div class="login-error" id="login-error">Incorrect password. Please try again.</div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="admin-screen">
  <div class="topbar">
    <div class="topbar-title">Daniel — Admin Panel</div>
    <span class="topbar-meta" id="last-refresh">—</span>
    <button class="topbar-refresh" onclick="loadWishes()">&#8635; Refresh</button>
    <button class="topbar-logout" onclick="doLogout()">Logout</button>
  </div>

  <div class="stats-bar">
    <div class="stat-block">
      <div class="stat-num green" id="stat-total">—</div>
      <div class="stat-label">Total Wishes</div>
    </div>
    <div class="stat-block">
      <div class="stat-num" id="stat-visible">—</div>
      <div class="stat-label">Visible</div>
    </div>
    <div class="stat-block">
      <div class="stat-num red" id="stat-blocked">—</div>
      <div class="stat-label">Blocked</div>
    </div>
    <div class="stat-block">
      <div class="stat-num amber" id="stat-media">—</div>
      <div class="stat-label">With Media</div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('visible', this)">Visible</button>
    <button class="filter-btn" onclick="setFilter('blocked', this)">Blocked</button>
    <button class="filter-btn" onclick="setFilter('media', this)">Has Media</button>
    <button class="filter-btn" onclick="setFilter('pt', this)">&#127463;&#127479; PT</button>
    <button class="filter-btn" onclick="setFilter('en', this)">&#127470;&#127466; EN</button>
    <input type="text" class="filter-search" id="search-input" placeholder="Search name or message…" oninput="renderWishes()">
  </div>

  <div class="wishes-container" id="wishes-container">
    <div class="loading-state">
      <div class="spinner"></div>
      Loading wishes…
    </div>
  </div>
</div>

<!-- ── DELETE CONFIRM MODAL ── -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <div class="modal-icon">&#128465;</div>
    <div class="modal-title">Delete this wish?</div>
    <div class="modal-body">
      You are about to permanently delete the message from
      <span class="modal-name" id="modal-name">—</span>.
      This cannot be undone.
    </div>
    <div class="modal-btns">
      <button class="modal-cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" id="modal-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="admin-toast" id="admin-toast">
  <div class="dot"></div>
  <span id="toast-text">Done</span>
</div>

<script>
var token    = '';
var allWishes = [];
var activeFilter = 'all';

/* ── LOGIN ── */
document.getElementById('pwd-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  var pwd = document.getElementById('pwd-input').value;
  var btn = document.getElementById('login-btn');
  var err = document.getElementById('login-error');
  btn.disabled = true;
  btn.textContent = 'Checking…';
  err.classList.remove('show');

  try {
    var res = await fetch('/api/admin?action=login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ password: pwd })
    });
    var data = await res.json();
    if (res.ok && data.token) {
      token = data.token;
      sessionStorage.setItem('adminToken', token);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadWishes();
    } else {
      err.textContent = data.error || 'Incorrect password.';
      err.classList.add('show');
    }
  } catch(e) {
    err.textContent = 'Connection error. Is the server running?';
    err.classList.add('show');
  }

  btn.disabled = false;
  btn.textContent = 'Access Panel';
}

function doLogout() {
  token = '';
  sessionStorage.removeItem('adminToken');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('pwd-input').value = '';
}

/* ── AUTO-RESTORE SESSION ── */
(function() {
  var saved = sessionStorage.getItem('adminToken');
  if (saved) {
    token = saved;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadWishes();
  }
})();

/* ── LOAD WISHES ── */
async function loadWishes() {
  document.getElementById('wishes-container').innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading wishes…</div>';
  try {
    var res = await fetch('/api/admin?action=list', {
      headers: { 'x-admin-token': token }
    });
    if (res.status === 401) { doLogout(); return; }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allWishes = await res.json();
    var now = new Date();
    document.getElementById('last-refresh').textContent = 'Updated ' + now.toLocaleTimeString();
    updateStats();
    renderWishes();
  } catch(e) {
    document.getElementById('wishes-container').innerHTML = '<div class="loading-state">Failed to load: ' + e.message + '</div>';
  }
}

function updateStats() {
  var total   = allWishes.length;
  var blocked = allWishes.filter(function(w){ return w.blocked; }).length;
  var media   = allWishes.filter(function(w){ return w.photo || w.video; }).length;
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-visible').textContent = total - blocked;
  document.getElementById('stat-blocked').textContent = blocked;
  document.getElementById('stat-media').textContent   = media;
}

/* ── FILTER ── */
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderWishes();
}

function getFiltered() {
  var q = (document.getElementById('search-input').value || '').toLowerCase();
  return allWishes.filter(function(w) {
    if (activeFilter === 'visible' && w.blocked) return false;
    if (activeFilter === 'blocked' && !w.blocked) return false;
    if (activeFilter === 'media'   && !w.photo && !w.video) return false;
    if (activeFilter === 'pt'      && w.lang !== 'pt') return false;
    if (activeFilter === 'en'      && w.lang === 'pt') return false;
    if (q) {
      var hay = ((w.name||'') + ' ' + (w.message||'') + ' ' + (w.location||'')).toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  }).sort(function(a,b){ return (b.ts||0)-(a.ts||0); });
}

/* ── RENDER ── */
function esc(t) { var d = document.createElement('div'); d.textContent = t||''; return d.innerHTML; }
function ini(n) { return (n||'?').trim().split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase(); }
function fmtDate(ts) {
  if (!ts) return '—';
  var d = new Date(ts);
  return d.toLocaleDateString('en-GB', {day:'2-digit',month:'short'}) + ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

function renderWishes() {
  var wishes = getFiltered();
  var container = document.getElementById('wishes-container');

  if (!wishes.length) {
    container.innerHTML = '<div class="empty-state">No wishes match this filter.</div>';
    return;
  }

  container.innerHTML = '';
  wishes.forEach(function(w) {
    container.appendChild(buildRow(w));
  });
}

function buildRow(w) {
  var row = document.createElement('div');
  row.className = 'wish-row' + (w.blocked ? ' blocked' : '') + (w.moderated ? ' moderated' : '');
  row.id = 'row-' + w.ts;

  var avatarInner = w.photo
    ? '<img src="' + esc(w.photo) + '" alt="">'
    : ini(w.name);

  var badges = '';
  badges += '<span class="badge badge-' + (w.lang||'en') + '">' + (w.lang === 'pt' ? 'PT' : 'EN') + '</span>';
  if (w.blocked)   badges += ' <span class="badge badge-blocked">Blocked</span>';
  if (w.edited)    badges += ' <span class="badge badge-edited">Edited</span>';
  if (w.moderated) badges += ' <span class="badge badge-moderated">Moderated</span>';
  if (w.photo)     badges += ' <span class="badge badge-photo">&#128247; Photo</span>';
  if (w.video)     badges += ' <span class="badge badge-video">&#127909; Video</span>';

  var mediaHtml = '';
  if (w.photo || w.video) {
    mediaHtml = '<div class="wish-media-row">';
    if (w.photo) mediaHtml += '<img class="admin-media-thumb" src="' + esc(w.photo) + '" alt="photo">';
    if (w.video) mediaHtml += '<video class="admin-video-thumb" src="' + esc(w.video) + '" controls></video>';
    mediaHtml += '</div>';
  }

  var blockBtn = w.blocked
    ? '<button class="action-btn btn-unblock" onclick="blockWish(' + w.ts + ', false)">&#9654; Unblock</button>'
    : '<button class="action-btn btn-block"   onclick="blockWish(' + w.ts + ', true)">&#9888; Block</button>';

  var modBtn = (w.photo || w.video)
    ? '<button class="action-btn btn-mod" onclick="openModerate(' + w.ts + ')">&#128065; Moderate media</button>'
    : '';

  row.innerHTML =
    '<div class="wish-row-top">' +
      '<div class="wish-avatar-sm">' + avatarInner + '</div>' +
      '<div class="wish-info">' +
        '<div class="wish-name-row">' +
          '<span class="wish-name">' + esc(w.name || 'Anonymous') + '</span>' +
          (w.location ? '<span class="wish-location">&#128205; ' + esc(w.location) + '</span>' : '') +
          badges +
          '<span class="wish-ts">' + fmtDate(w.ts) + '</span>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="wish-message-text" id="msg-' + w.ts + '">' + esc(w.message) + '</div>' +
    '<div class="wish-edit-area" id="edit-' + w.ts + '">' +
      '<input class="edit-field" id="edit-name-' + w.ts + '" value="' + esc(w.name||'') + '" placeholder="Name">' +
      '<input class="edit-field" id="edit-loc-' + w.ts + '"  value="' + esc(w.location||'') + '" placeholder="Location">' +
      '<textarea class="edit-field" id="edit-msg-' + w.ts + '" placeholder="Message">' + esc(w.message||'') + '</textarea>' +
      '<div class="edit-actions">' +
        '<button class="action-btn btn-save"   onclick="saveEdit(' + w.ts + ')">&#10003; Save changes</button>' +
        '<button class="action-btn btn-cancel" onclick="cancelEdit(' + w.ts + ')">Cancel</button>' +
      '</div>' +
    '</div>' +
    mediaHtml +
    '<div class="wish-actions">' +
      '<button class="action-btn btn-edit"   onclick="openEdit(' + w.ts + ')">&#9998; Edit</button>' +
      blockBtn +
      modBtn +
      '<button class="action-btn btn-delete" onclick="confirmDelete(' + w.ts + ', \'' + esc(w.name||'Anonymous').replace(/'/g, "\\'") + '\')">&#128465; Delete</button>' +
    '</div>';

  return row;
}

/* ── EDIT ── */
function openEdit(ts) {
  document.getElementById('edit-' + ts).classList.add('open');
  document.getElementById('msg-' + ts).style.display = 'none';
}
function cancelEdit(ts) {
  document.getElementById('edit-' + ts).classList.remove('open');
  document.getElementById('msg-' + ts).style.display = '';
}

async function saveEdit(ts) {
  var name     = document.getElementById('edit-name-' + ts).value.trim();
  var location = document.getElementById('edit-loc-' + ts).value.trim();
  var message  = document.getElementById('edit-msg-' + ts).value.trim();
  if (!message) { showToast('Message cannot be empty', true); return; }

  try {
    var res = await adminPost('edit', { ts: ts, name: name, location: location, message: message });
    // Update local state
    var idx = allWishes.findIndex(function(w){ return w.ts === ts; });
    if (idx !== -1) { allWishes[idx].name = name; allWishes[idx].location = location; allWishes[idx].message = message; allWishes[idx].edited = true; }
    showToast('Message updated');
    renderWishes();
  } catch(e) { showToast(e.message, true); }
}

/* ── BLOCK ── */
async function blockWish(ts, blocked) {
  try {
    await adminPost('block', { ts: ts, blocked: blocked });
    var idx = allWishes.findIndex(function(w){ return w.ts === ts; });
    if (idx !== -1) allWishes[idx].blocked = blocked;
    updateStats();
    renderWishes();
    showToast(blocked ? 'Wish blocked from public wall' : 'Wish restored to public wall');
  } catch(e) { showToast(e.message, true); }
}

/* ── MODERATE ── */
function openModerate(ts) {
  var w = allWishes.find(function(x){ return x.ts === ts; });
  if (!w) return;

  var options = [];
  if (w.photo) options.push('Remove photo');
  if (w.video) options.push('Remove video');

  var msg = 'Choose what to remove from this wish:\n\n' + options.map(function(o,i){ return (i+1)+'. '+o; }).join('\n');
  var choice = prompt(msg + '\n\nType 1' + (options.length > 1 ? ' or 2' : '') + ', or Cancel:');
  if (!choice) return;

  var removePhoto = false, removeVideo = false;
  if (choice === '1') {
    if (w.photo) removePhoto = true; else if (w.video) removeVideo = true;
  } else if (choice === '2' && w.photo && w.video) {
    removeVideo = true;
  }

  if (!removePhoto && !removeVideo) return;

  adminPost('moderate', { ts: ts, removePhoto: removePhoto, removeVideo: removeVideo })
    .then(function() {
      var idx = allWishes.findIndex(function(x){ return x.ts === ts; });
      if (idx !== -1) {
        if (removePhoto) allWishes[idx].photo = '';
        if (removeVideo) allWishes[idx].video = '';
        allWishes[idx].moderated = true;
      }
      updateStats();
      renderWishes();
      showToast('Media removed');
    })
    .catch(function(e){ showToast(e.message, true); });
}

/* ── DELETE ── */
var pendingDeleteTs = null;

function confirmDelete(ts, name) {
  pendingDeleteTs = ts;
  document.getElementById('modal-name').textContent = name;
  document.getElementById('delete-modal').classList.add('open');
}

function closeModal() {
  pendingDeleteTs = null;
  document.getElementById('delete-modal').classList.remove('open');
}

document.getElementById('modal-confirm-btn').addEventListener('click', async function() {
  if (!pendingDeleteTs) return;
  var ts = pendingDeleteTs;
  closeModal();
  try {
    await adminPost('delete', { ts: ts });
    allWishes = allWishes.filter(function(w){ return w.ts !== ts; });
    updateStats();
    renderWishes();
    showToast('Wish permanently deleted');
  } catch(e) { showToast(e.message, true); }
});

document.getElementById('delete-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ── API HELPER ── */
async function adminPost(action, body) {
  var res = await fetch('/api/admin?action=' + action, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-token': token },
    body:    JSON.stringify(body)
  });
  if (res.status === 401) { doLogout(); throw new Error('Session expired'); }
  var data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

/* ── TOAST ── */
var toastTimer;
function showToast(msg, isError) {
  clearTimeout(toastTimer);
  var toast = document.getElementById('admin-toast');
  var dot   = toast.querySelector('.dot');
  document.getElementById('toast-text').textContent = msg;
  toast.classList.toggle('error', !!isError);
  dot.style.background = isError ? 'var(--red)' : 'var(--green)';
  toast.classList.add('show');
  toastTimer = setTimeout(function(){ toast.classList.remove('show'); }, 3500);
}

/* ── AUTO REFRESH every 60s ── */
setInterval(function() {
  if (token) loadWishes();
}, 60000);
</script>
